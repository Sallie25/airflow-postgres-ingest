# ──────────────────────────────────────
#  Apache Airflow — Full Setup
# ──────────────────────────────────────

version: '3.8'

x-airflow-common:  # Reusable config block
  &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./dags:/opt/airflow/dags    # your DAG files go here
    - ./logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock  # Docker access
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ── 1. YOUR DATA DATABASE ────────────
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ny_taxi
    ports:
      - '5432:5432'

  # ── 2. PGADMIN (DB visual UI) ────────
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - '8085:80'   # open localhost:8085 in browser

  # ── 3. AIRFLOW METADATA DATABASE ─────
  airflow-db:
    image: postgres:18
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'airflow']
      interval: 5s
      retries: 5

  # ── 4. INIT (runs once, then exits) ──
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin
      --password admin --firstname Admin
      --lastname User --role Admin
      --email admin@example.com"
    restart: on-failure

  # ── 5. SCHEDULER ─────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── 6. WEBSERVER ─────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - '8080:8080'   # open localhost:8080 in browser
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_db_data:
